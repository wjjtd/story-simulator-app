name: Build Kivy APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v2
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip python3-dev python3-venv openjdk-8-jdk
        pip3 install Cython
        pip3 install buildozer
        
    - name: Create and setup buildozer.spec
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi
        sed -i 's/title = My Application/title = AI故事模拟器/g' buildozer.spec
        sed -i 's/package.name = myapp/package.name = storysimulator/g' buildozer.spec
        sed -i 's/package.domain = org.example/package.domain = com.example/g' buildozer.spec
        sed -i 's|requirements = kivy|requirements = python3,kivy,requests|g' buildozer.spec
        sed -i 's/android.permissions = /android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE/g' buildozer.spec
        sed -i 's/android.api = 27/android.api = 27/g' buildozer.spec
        sed -i 's/android.minapi = 21/android.minapi = 21/g' buildozer.spec
        cat buildozer.spec
        
    - name: Build APK
      run: |
        buildozer android debug --verbose
        echo "Finding APK files..."
        find . -type f -name "*.apk"
        
    - name: Upload APK
      uses: actions/upload-artifact@v2
      with:
        name: kivy-apk
        path: '**/*.apk'
